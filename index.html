<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Maui Jim — Hub Professionnel</title>

  <style>
    :root {
      --black: #070707;
      --white: #ffffff;
      --soft-white: rgba(255,255,255,.82);
      --line: rgba(255,255,255,.58);
      --line-hover: rgba(255,255,255,.96);
      --button-bg: rgba(255,255,255,.04);
      --button-bg-hover: rgba(255,255,255,.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      font-family: "ABCFavorit", "ABC Favorit", "Favorit", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      width: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--white);
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 24%, rgba(0, 140, 190, .35), transparent 34%),
        radial-gradient(circle at 82% 68%, rgba(242, 130, 40, .28), transparent 32%),
        linear-gradient(135deg, #06161b 0%, #070707 55%, #140f08 100%);
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: -3;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.30) 0%, rgba(0,0,0,.16) 42%, rgba(0,0,0,.46) 100%),
        linear-gradient(90deg, rgba(0,0,0,.25) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,.25) 100%);
      z-index: -2;
    }

    .top-logo {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: min(248px, 56vw);
      height: auto;
      opacity: .98;
    }

    .fallback-logo {
      position: absolute;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--white);
      font-size: 26px;
      letter-spacing: .12em;
      display: none;
      white-space: nowrap;
    }

    .content {
      width: min(100%, 1040px);
      padding: 112px 28px 56px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-family: "ABCFavorit Medium", "ABCFavorit", "ABC Favorit", "Favorit", "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(38px, 6.2vw, 78px);
      line-height: 1.02;
      letter-spacing: .01em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 500px;
      color: var(--soft-white);
      font-size: clamp(13px, 1.45vw, 15.5px);
      line-height: 1.5;
    }

    .actions {
      margin-top: 38px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      width: 100%;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      min-width: min(100%, 276px);
      padding: 14px 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--white);
      background: var(--button-bg);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.2;
      letter-spacing: .01em;
      transition: border-color .18s ease, background .18s ease, transform .18s ease, opacity .18s ease;
      text-align: center;
    }

    .button:hover {
      border-color: var(--line-hover);
      background: var(--button-bg-hover);
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
      opacity: .82;
    }

    .footer-line {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 880px);
      display: flex;
      justify-content: center;
      color: rgba(255,255,255,.66);
      font-size: 11px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 680px) {
      .top-logo {
        top: 28px;
        width: min(210px, 64vw);
      }

      .fallback-logo {
        top: 31px;
        font-size: 22px;
      }

      .content {
        padding: 96px 22px 76px;
      }

      h1 {
        font-size: clamp(36px, 11vw, 56px);
      }

      .subtitle {
        margin-top: 16px;
        font-size: 13px;
        max-width: 300px;
      }

      .actions {
        margin-top: 32px;
        gap: 11px;
        flex-direction: column;
        align-items: center;
      }

      .button {
        width: min(100%, 340px);
        min-height: 50px;
        font-size: 13px;
      }

      .footer-line {
        bottom: 18px;
        font-size: 10.5px;
      }
    }
  </style>
</head>

<body>
  <main class="hero" aria-label="Maui Jim professional resources hub">
    <video class="hero-video" autoplay muted loop playsinline preload="metadata">
      <source src="assets/maui-jim-video.mp4" type="video/mp4" />
    </video>

    <div class="overlay" aria-hidden="true"></div>

    <img
      class="top-logo"
      src="assets/maui-jim-logo-white.png"
      alt="Maui Jim"
      onerror="this.style.display='none'; document.querySelector('.fallback-logo').style.display='block';"
    />

    <div class="fallback-logo" aria-hidden="true">MAUI JIM</div>

    <section class="content">
      <h1>COLOR YOU CAN FEEL</h1>

      <p class="subtitle">
        Retrouvez toutes vos ressources Maui Jim en un seul endroit.
      </p>

      <nav class="actions" aria-label="Maui Jim resources">
        <a
          class="button"
          href="https://eyelearn.keringeyewear.com/access/login"
          target="_blank"
          rel="noopener noreferrer"
        >
          Formez-vous avec Kering Eyelearn
        </a>

        <a
          class="button"
          href="https://trade.mauijim.com/mauijimb2bstorefront/fr_FR/login"
          target="_blank"
          rel="noopener noreferrer"
        >
          Accéder à votre plateforme B2B
        </a>

        <a
          class="button"
          href="https://kering.sharepoint.com/:f:/r/sites/VisuelsMarquesKeringEyewearFrance/Shared%20Documents/0.CLIENTS/MAUI%20JIM?csf=1&web=1&e=bztIEH"
          target="_blank"
          rel="noopener noreferrer"
        >
          Accéder aux visuels de communication
        </a>
      </nav>
    </section>

    <div class="footer-line">
      Maui Jim | Kering Eyewear
    </div>
  </main>
</body>
</html>
